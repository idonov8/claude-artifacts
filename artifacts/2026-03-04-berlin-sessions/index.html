<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berlin Sessions — Open Jams & Mics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0c; --surface: #161616; --surface2: #1e1e1e;
  --border: #272727; --text: #e6e1d6; --muted: #5a5a5a; --muted2: #888;
  --jazz: #f5a623; --blues: #5b9bd5; --hiphop: #b87fc9; --openmic: #3cbf8a; --swing: #f06b8a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; min-height: 100vh; font-size: 13px; display: flex; flex-direction: column; }
main { flex: 1; }
header { display: flex; align-items: flex-end; justify-content: space-between; padding: 28px 36px 20px; border-bottom: 1px solid var(--border); }
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 3rem; letter-spacing: -0.01em; line-height: 0.95; text-transform: uppercase; }
.logo-accent { color: var(--jazz); }
.tagline { font-size: 0.6rem; color: var(--muted2); letter-spacing: 0.25em; text-transform: uppercase; margin-top: 6px; }
.header-meta { text-align: right; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; line-height: 2; text-transform: uppercase; }
.controls { padding: 14px 36px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); }
.controls-label { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin-right: 2px; }
.filter-btn { background: none; border: 1px solid var(--border); color: var(--muted2); font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; padding: 4px 11px; cursor: pointer; letter-spacing: 0.12em; text-transform: uppercase; transition: all 0.15s ease; border-radius: 0; outline: none; }
.filter-btn:hover { border-color: var(--muted2); color: var(--text); }
.filter-btn.active-all      { border-color: var(--text);    color: var(--text);    background: rgba(230,225,214,0.06); }
.filter-btn.active-Jazz     { border-color: var(--jazz);    color: var(--jazz);    background: rgba(245,166,35,0.08); }
.filter-btn.active-Blues    { border-color: var(--blues);   color: var(--blues);   background: rgba(91,155,213,0.08); }
.filter-btn.active-Hip-Hop  { border-color: var(--hiphop);  color: var(--hiphop);  background: rgba(184,127,201,0.08); }
.filter-btn.active-Open-Mic { border-color: var(--openmic); color: var(--openmic); background: rgba(60,191,138,0.08); }
.filter-btn.active-Swing    { border-color: var(--swing);   color: var(--swing);   background: rgba(240,107,138,0.08); }
.view-toggle { margin-left: auto; display: flex; gap: 6px; }
.view-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; padding: 4px 12px; cursor: pointer; letter-spacing: 0.12em; text-transform: uppercase; transition: all 0.15s; outline: none; }
.view-btn:hover { border-color: var(--muted2); color: var(--text); }
.view-btn.active { border-color: var(--text); color: var(--text); }
#view-calendar { padding: 24px 36px 36px; overflow-x: auto; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); min-width: 840px; }
.cal-col { background: var(--bg); }
.cal-day-header { background: var(--surface); padding: 10px 12px 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted2); border-bottom: 1px solid var(--border); user-select: none; }
.cal-day-events { padding: 8px; min-height: 140px; display: flex; flex-direction: column; gap: 5px; }
.empty-day { font-size: 0.6rem; color: var(--border); margin: auto; text-align: center; padding: 20px 0; }
.evt-card { border-left: 2px solid; padding: 7px 9px; cursor: pointer; background: var(--surface); transition: transform 0.1s ease, background 0.1s ease; }
.evt-card:hover { transform: translateX(3px); background: var(--surface2); }
.evt-Jazz     { border-color: var(--jazz); }
.evt-Blues    { border-color: var(--blues); }
.evt-Hip-Hop  { border-color: var(--hiphop); }
.evt-Open-Mic { border-color: var(--openmic); }
.evt-Swing    { border-color: var(--swing); }
.evt-time  { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 2px; }
.evt-name  { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.82rem; letter-spacing: 0.02em; line-height: 1.2; margin-bottom: 2px; }
.evt-venue { font-size: 0.58rem; color: var(--muted2); letter-spacing: 0.03em; }
.evt-tag   { display: inline-block; font-size: 0.5rem; padding: 1px 5px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; border: 1px solid; }
.tag-Jazz     { color: var(--jazz);    border-color: rgba(245,166,35,0.3); }
.tag-Blues    { color: var(--blues);   border-color: rgba(91,155,213,0.3); }
.tag-Hip-Hop  { color: var(--hiphop);  border-color: rgba(184,127,201,0.3); }
.tag-Open-Mic { color: var(--openmic); border-color: rgba(60,191,138,0.3); }
.tag-Swing    { color: var(--swing);   border-color: rgba(240,107,138,0.3); }
.evt-note  { font-size: 0.5rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }
#view-map { padding: 24px 36px 36px; }
#map { height: 560px; border: 1px solid var(--border); background: #111; }
#map-loading { height: 560px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; }
.map-legend { display: flex; gap: 20px; padding: 12px 0 0; flex-wrap: wrap; }
.map-legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted2); }
.map-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; backdrop-filter: blur(3px); }
.modal { background: var(--surface); border: 1px solid var(--border); max-width: 460px; width: 100%; position: relative; animation: slide-up 0.2s ease; }
@keyframes slide-up { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-top  { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); }
.modal-body { padding: 20px 28px 24px; }
.modal-close { position: absolute; top: 14px; right: 18px; background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; line-height: 1; transition: color 0.1s; font-family: inherit; }
.modal-close:hover { color: var(--text); }
.modal-genre { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
.modal-name  { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 2rem; letter-spacing: -0.01em; line-height: 1.05; margin-bottom: 4px; }
.modal-venue-line { font-size: 0.68rem; color: var(--muted2); }
.modal-row { display: flex; gap: 10px; font-size: 0.65rem; padding: 6px 0; border-bottom: 1px solid var(--border); align-items: center; }
.modal-row-key { color: var(--muted); min-width: 64px; letter-spacing: 0.06em; flex-shrink: 0; }
.modal-links-row { display: flex; gap: 18px; padding: 12px 0 0; flex-wrap: wrap; }
.modal-link { color: var(--muted2); text-decoration: none; transition: color 0.12s; font-size: 0.63rem; letter-spacing: 0.04em; }
.modal-link:hover { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
.modal-desc { margin-top: 14px; font-size: 0.68rem; color: var(--muted2); line-height: 1.7; font-style: italic; }
footer { padding: 14px 36px; border-top: 1px solid var(--border); text-align: center; font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
footer a { color: var(--muted2); text-decoration: none; transition: color 0.12s; }
footer a:hover { color: var(--text); }
.hidden { display: none !important; }
.leaflet-popup-content-wrapper { background: #1a1a1a !important; border: 1px solid #2a2a2a !important; border-radius: 0 !important; box-shadow: 0 4px 20px rgba(0,0,0,0.8) !important; padding: 0 !important; }
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip { background: #1a1a1a !important; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Berlin <span class="logo-accent">Sessions</span></div>
    <div class="tagline">Open Jams · Open Mics · Live Sessions · Berlin</div>
  </div>
  <div class="header-meta">Recurring weekly events<br>Updated 2026</div>
</header>

<div class="controls">
  <span class="controls-label">Genre</span>
  <button class="filter-btn active-all"  onclick="setFilter('all',this)">All</button>
  <button class="filter-btn"             onclick="setFilter('Jazz',this)">Jazz</button>
  <button class="filter-btn"             onclick="setFilter('Blues',this)">Blues</button>
  <button class="filter-btn"             onclick="setFilter('Hip-Hop',this)">Hip-Hop</button>
  <button class="filter-btn"             onclick="setFilter('Open Mic',this)">Open Mic</button>
  <button class="filter-btn"             onclick="setFilter('Swing',this)">Swing</button>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-cal" onclick="setView('calendar')">&#9638; Calendar</button>
    <button class="view-btn"        id="btn-map" onclick="setView('map')">&#9678; Map</button>
  </div>
</div>

<main>
  <div id="view-calendar">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div id="view-map" class="hidden">
    <div id="map-loading">Loading map&hellip;</div>
    <div id="map" class="hidden"></div>
    <div class="map-legend">
      <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--jazz)"></div>Jazz</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--blues)"></div>Blues</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--hiphop)"></div>Hip-Hop</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--openmic)"></div>Open Mic</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--swing)"></div>Swing</div>
    </div>
  </div>
</main>

<div class="modal-overlay hidden" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#215;</button>
    <div class="modal-top"  id="modal-top"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<footer>Made by <a href="https://idonov.com" target="_blank" rel="noopener">Ido Nov</a></footer>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const COLOR = { Jazz:'#f5a623', Blues:'#5b9bd5', 'Hip-Hop':'#b87fc9', 'Open Mic':'#3cbf8a', Swing:'#f06b8a' };

const sessions = [
  { name:"Nightly Jam Session", venue:"The Hat Bar", address:"Lotte-Lenya-Bogen 550, Charlottenburg, Berlin", day:["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"], time:"21:00", type:"Jazz", entry:"Free", description:"Every single night under the S-Bahn arches near Bahnhof Zoo — a proper 1920s speakeasy vibe in a brick-vaulted space. American jazz tradition, whiskey selection to match. With host approval, bring your instrument and join.", lat:52.5042, lng:13.3285, url:null },
  { name:"Robin's Nest Jam", venue:"B-flat Jazz Club", address:"Dircksenstrasse 40, Mitte, Berlin", day:["Wednesday"], time:"21:00", type:"Jazz", entry:"10-15 EUR", description:"Led by bassist Robin Draganic, this weekly jam at b-flat is organised chaos at its finest — bebop, funk, and fusion near Hackescher Markt.", lat:52.5228, lng:13.4072, url:"https://b-flat-berlin.de" },
  { name:"Jazzed Up Jam Session", venue:"Zig Zag Jazz Club", address:"Hauptstrasse 89, Friedenau, Berlin", day:["Tuesday"], time:"20:30", type:"Jazz", entry:"~20-25 EUR (artist support)", description:"Berlin's hippest jam. International and local musicians share the stage in this acoustically pristine Friedenau gem. Sinti Jazz, contemporary, bebop — the level is consistently high.", lat:52.4773, lng:13.3563, url:"https://www.zigzag-jazzclub.berlin" },
  { name:"Jazz After Midnight", venue:"A-Trane", address:"Bleibtreustrasse 1, Charlottenburg, Berlin", day:["Saturday"], time:"22:00", type:"Jazz", entry:"15-25 EUR", description:"The legendary late-night Saturday jam at one of Europe's most storied jazz clubs. Named after Coltrane and Take the A-Train. Red walls, baby grand, fewer than 100 people.", lat:52.5029, lng:13.3210, url:"https://www.a-trane.de" },
  { name:"Jazzy Berlin Rooftop Jam", venue:"Klunkerkranich", address:"Karl-Marx-Strasse 66, Neukolln, Berlin", day:["Sunday"], time:"18:00", type:"Jazz", entry:"Free", note:"1st Sunday of month", description:"Monthly jazz jam on Neukolln's iconic rooftop. First Sunday of every month, 18:00-22:00. Organised by the Jazzy Berlin collective.", lat:52.4817, lng:13.4346, url:"https://klunkerkranich.org" },
  { name:"Blue Monday", venue:"Cafe Sandmann", address:"Reuterstrasse 7, Neukolln, Berlin", day:["Monday"], time:"20:00", type:"Blues", entry:"Free", description:"A real Neukolln institution. Every Monday: house band plays an acoustic blues set, then the stage opens for an all-comers jam. Bring your slide guitar.", lat:52.4841, lng:13.4278, url:null },
  { name:"Swag Jam", venue:"Badehaus Berlin", address:"Revaler Str. 99, Friedrichshain, Berlin", day:["Tuesday"], time:"20:00", type:"Hip-Hop", entry:"Free", description:"Berlin's finest hip-hop open mic night on the legendary R.A.W. Gelande. Global performers backed by a tight live house band. Expect real MCs, real energy, real Berlin.", lat:52.5083, lng:13.4560, url:"https://badehaus.berlin" },
  { name:"Open Mic Night", venue:"arcanoa", address:"Am Tempelhofer Berg 8, Kreuzberg, Berlin", day:["Monday"], time:"20:00", type:"Open Mic", entry:"Free", description:"One of Berlin's most beautiful bars — there's literally a river running through it. The Monday open mic welcomes all genres and all skill levels. Show up early to grab your slot.", lat:52.4880, lng:13.3948, url:null },
  { name:"Open Mic", venue:"Barkett", address:"Czeminskistrasse 10, Schoneberg, Berlin", day:["Monday"], time:"20:00", type:"Open Mic", entry:"Free", description:"A moss-covered stage and laid-back Schoneberg crowd. Barkett's Monday open mic is casual, friendly, and wonderfully low-pressure.", lat:52.4837, lng:13.3606, url:null },
  { name:"Open Stage", venue:"Prachtwerk", address:"Ganghoferstrasse 2, Neukolln, Berlin", day:["Wednesday"], time:"20:00", type:"Open Mic", entry:"Free", description:"Don't be put off by the imposing Grunderzeit architecture — Prachtwerk's open stage is laid-back. Great acoustics for solo or small acoustic acts.", lat:52.4788, lng:13.4284, url:null },
  { name:"Open Mic Night", venue:"Laksmi Bar", address:"Wrangelstrasse 93, Kreuzberg, Berlin", day:["Thursday"], time:"20:00", type:"Open Mic", entry:"Free", description:"Popular Kreuzberg open mic spanning multiple genres. Book your performance slot early — this one fills up very fast.", lat:52.4988, lng:13.4153, url:null },
  { name:"Swing Dance Night", venue:"Villa Neukolln", address:"Hermannstrasse 233, Neukolln, Berlin", day:["Thursday"], time:"20:00", type:"Swing", entry:"5-10 EUR", description:"Live swing and lindy hop at one of Neukolln's most beloved cultural venues. All levels welcome — beginners can join the intro lesson before the social dance. Great live bands, great floor.", lat:52.4732, lng:13.4391, url:"https://villa-neukoelln.de" },
];

let activeFilter = 'all', mapReady = false, leafletMap = null, mapMarkers = [];

function typeKey(t) { return t.replace(/ /g,'-'); }
function filtered() { return activeFilter==='all' ? sessions : sessions.filter(e=>e.type===activeFilter); }
function mapsUrl(a) { return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(a); }

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.className='filter-btn');
  btn.classList.add('active-'+( f==='all'?'all':f.replace(/ /g,'-') ));
  renderCalendar();
  if (mapReady) { clearMarkers(); placeMarkers(); }
}

function setView(v) {
  document.getElementById('view-calendar').classList.toggle('hidden', v!=='calendar');
  document.getElementById('view-map').classList.toggle('hidden', v!=='map');
  document.getElementById('btn-cal').classList.toggle('active', v==='calendar');
  document.getElementById('btn-map').classList.toggle('active', v==='map');
  if (v==='map' && !mapReady) loadLeaflet(initMap);
}

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DAYS.forEach(day => {
    const col = document.createElement('div');
    col.className = 'cal-col';
    const hdr = document.createElement('div');
    hdr.className = 'cal-day-header';
    hdr.textContent = day.slice(0,3).toUpperCase();
    col.appendChild(hdr);
    const evList = document.createElement('div');
    evList.className = 'cal-day-events';
    const dayEvs = filtered().filter(e => e.day.includes(day));
    if (dayEvs.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-day';
      empty.innerHTML = '&mdash;';
      evList.appendChild(empty);
    } else {
      dayEvs.forEach(ev => {
        const tk = typeKey(ev.type);
        const card = document.createElement('div');
        card.className = 'evt-card evt-'+tk;
        card.onclick = () => openModal(ev);
        card.innerHTML = '<div class="evt-time">'+ev.time+'</div><div class="evt-name">'+ev.name+'</div><div class="evt-venue">'+ev.venue+'</div><div class="evt-tag tag-'+tk+'">'+ev.type+'</div>'+(ev.note?'<div class="evt-note">'+ev.note+'</div>':'');
        evList.appendChild(card);
      });
    }
    col.appendChild(evList);
    grid.appendChild(col);
  });
}

function openModal(ev) {
  const color = COLOR[ev.type]||'#888';
  document.getElementById('modal-top').innerHTML =
    '<div class="modal-genre" style="color:'+color+'">'+ev.type+'</div>'+
    '<div class="modal-name">'+ev.name+'</div>'+
    '<div class="modal-venue-line">'+ev.venue+' &nbsp;&middot;&nbsp; '+ev.address+'</div>';
  document.getElementById('modal-body').innerHTML =
    '<div class="modal-row"><span class="modal-row-key">Day</span><span>'+(ev.day.length===7?'Every night':ev.day.join(', '))+(ev.note?' <span style="color:var(--muted);font-size:0.57rem">('+ev.note+')</span>':'')+'</span></div>'+
    '<div class="modal-row"><span class="modal-row-key">Time</span><span>'+ev.time+'</span></div>'+
    '<div class="modal-row"><span class="modal-row-key">Entry</span><span>'+ev.entry+'</span></div>'+
    '<div class="modal-links-row">'+
      '<a class="modal-link" href="'+mapsUrl(ev.address)+'" target="_blank" rel="noopener">&#128205; Google Maps</a>'+
      (ev.url?'<a class="modal-link" href="'+ev.url+'" target="_blank" rel="noopener">&#128279; More info</a>':'')+
    '</div>'+
    '<div class="modal-desc">"'+ev.description+'"</div>';
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function loadLeaflet(cb) {
  if (typeof L !== 'undefined') { cb(); return; }
  const css = document.createElement('link');
  css.rel = 'stylesheet';
  css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(css);
  const s = document.createElement('script');
  s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  s.onload = cb;
  s.onerror = () => { document.getElementById('map-loading').textContent = 'Map failed to load.'; };
  document.head.appendChild(s);
}

function initMap() {
  mapReady = true;
  document.getElementById('map-loading').classList.add('hidden');
  const mapEl = document.getElementById('map');
  mapEl.classList.remove('hidden');
  leafletMap = L.map('map').setView([52.497, 13.388], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CartoDB', subdomains:'abcd', maxZoom:19
  }).addTo(leafletMap);
  placeMarkers();
}

function clearMarkers() { mapMarkers.forEach(m=>m.remove()); mapMarkers=[]; }

function placeMarkers() {
  filtered().forEach(ev => {
    const color = COLOR[ev.type]||'#888';
    const isNightly = ev.day.length===7;
    const size = isNightly ? 14 : 11;
    const glow = isNightly ? 'box-shadow:0 0 8px '+color+',0 0 16px '+color+';' : 'box-shadow:0 0 4px '+color+';';
    const icon = L.divIcon({
      className:'',
      html:'<div style="width:'+size+'px;height:'+size+'px;background:'+color+';border-radius:50%;border:2px solid rgba(0,0,0,0.6);'+glow+'"></div>',
      iconSize:[size,size], iconAnchor:[size/2,size/2]
    });
    const dayLabel = isNightly ? 'Every night' : ev.day.join(', ');
    const popup = '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;padding:12px 14px;min-width:190px;background:#161616;color:#e6e1d6;">'+
      '<div style="color:'+color+';font-size:9px;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:5px">'+ev.type+'</div>'+
      '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:16px;margin-bottom:3px">'+ev.name+'</div>'+
      '<div style="color:#888;font-size:10px;margin-bottom:8px">'+ev.venue+'</div>'+
      '<div style="color:#aaa;font-size:10px;border-top:1px solid #272727;padding-top:7px">'+dayLabel+' &middot; '+ev.time+'</div>'+
      '<div style="color:#666;font-size:10px;margin-top:2px">'+ev.entry+'</div></div>';
    const marker = L.marker([ev.lat,ev.lng],{icon}).addTo(leafletMap)
      .bindPopup(popup,{maxWidth:280,closeButton:false})
      .on('click',()=>openModal(ev));
    mapMarkers.push(marker);
  });
}

renderCalendar();
</script>
</body>
</html>
