<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berlin Dances — Weekly Social Dances</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f2;
  --surface: #ffffff;
  --surface2: #f5f0e8;
  --border: #e2d9cc;
  --text: #1e1714;
  --muted: #a08e82;
  --muted2: #6d5c52;
  --tango: #a01929;
  --salsa: #c94d0f;
  --swing: #2d6e4e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  font-size: 13px;
  display: flex;
  flex-direction: column;
}
/* Subtle parquet/geometric background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.035;
  background-image:
    repeating-linear-gradient(45deg,  #6b4c11 0, #6b4c11 1px, transparent 0, transparent 50%),
    repeating-linear-gradient(-45deg, #6b4c11 0, #6b4c11 1px, transparent 0, transparent 50%);
  background-size: 36px 36px;
  pointer-events: none;
  z-index: 0;
}
main { flex: 1; position: relative; z-index: 1; }

/* ── Header ── */
header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 32px 40px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: relative;
  z-index: 1;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(to right, var(--tango), #e0843a, var(--salsa));
}
.logo {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 3rem;
  letter-spacing: -0.02em;
  line-height: 0.95;
}
.logo-accent { color: var(--tango); font-style: italic; }
.logo-sub {
  font-size: 0.62rem;
  color: var(--muted2);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-sub::before, .logo-sub::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.header-meta {
  text-align: right;
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  line-height: 2;
  text-transform: uppercase;
}

/* ── Controls ── */
.controls {
  padding: 12px 40px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: relative;
  z-index: 1;
}
.controls-label {
  font-size: 0.57rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-right: 2px;
}
.filter-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.6rem;
  padding: 5px 14px;
  cursor: pointer;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: all 0.15s ease;
  border-radius: 1px;
  outline: none;
}
.filter-btn:hover { border-color: var(--muted2); color: var(--text); }
.filter-btn.active-all   { border-color: var(--text);   color: var(--text);   background: rgba(30,23,20,0.05); }
.filter-btn.active-Tango { border-color: var(--tango);  color: var(--tango);  background: rgba(160,25,41,0.07); }
.filter-btn.active-Salsa { border-color: var(--salsa);  color: var(--salsa);  background: rgba(201,77,15,0.07); }
.filter-btn.active-Swing { border-color: var(--swing);  color: var(--swing);  background: rgba(45,110,78,0.07); }
.view-toggle { margin-left: auto; display: flex; gap: 6px; }
.view-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.58rem;
  padding: 5px 14px;
  cursor: pointer;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: all 0.15s;
  outline: none;
  border-radius: 1px;
}
.view-btn:hover { border-color: var(--muted2); color: var(--text); }
.view-btn.active { border-color: var(--text); color: var(--text); background: rgba(30,23,20,0.04); }

/* ── Calendar ── */
#view-calendar { padding: 28px 40px 40px; overflow-x: auto; }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--border);
  min-width: 820px;
  box-shadow: 0 2px 20px rgba(30,23,20,0.07);
}
.cal-col { background: var(--bg); }
.cal-day-header {
  background: var(--surface);
  padding: 12px 14px 10px;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted2);
  border-bottom: 1px solid var(--border);
  user-select: none;
}
.cal-day-events { padding: 10px; min-height: 160px; display: flex; flex-direction: column; gap: 7px; }
.empty-day { font-size: 0.58rem; color: var(--border); margin: auto; text-align: center; padding: 24px 0; letter-spacing: 0.1em; }

.evt-card {
  border-left: 3px solid;
  padding: 9px 11px;
  cursor: pointer;
  background: var(--surface);
  transition: transform 0.12s ease, box-shadow 0.12s ease;
  box-shadow: 0 1px 4px rgba(30,23,20,0.06);
}
.evt-card:hover { transform: translateX(3px); box-shadow: 0 3px 10px rgba(30,23,20,0.12); }
.evt-Tango { border-color: var(--tango); }
.evt-Salsa { border-color: var(--salsa); }
.evt-Swing { border-color: var(--swing); }

.evt-time  { font-size: 0.54rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 3px; }
.evt-name  { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 0.82rem; line-height: 1.25; margin-bottom: 2px; }
.evt-venue { font-size: 0.57rem; color: var(--muted2); }
.evt-tag   { display: inline-block; font-size: 0.5rem; padding: 2px 6px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 5px; border: 1px solid; }
.tag-Tango { color: var(--tango); border-color: rgba(160,25,41,0.3); }
.tag-Salsa { color: var(--salsa); border-color: rgba(201,77,15,0.3); }
.tag-Swing { color: var(--swing); border-color: rgba(45,110,78,0.3); }
.evt-note  { font-size: 0.5rem; color: var(--muted); margin-top: 3px; letter-spacing: 0.05em; font-style: italic; }

/* ── Map ── */
#view-map { padding: 28px 40px 40px; }
#map { height: 560px; border: 1px solid var(--border); box-shadow: 0 2px 20px rgba(30,23,20,0.08); }
#map-loading { height: 560px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; background: var(--surface); }
.map-legend { display: flex; gap: 22px; padding: 14px 0 0; flex-wrap: wrap; }
.map-legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted2); }
.map-legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(30,23,20,0.45); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; backdrop-filter: blur(4px); }
.modal { background: var(--surface); border: 1px solid var(--border); max-width: 460px; width: 100%; position: relative; animation: slide-up 0.2s ease; box-shadow: 0 10px 50px rgba(30,23,20,0.2); }
@keyframes slide-up { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-stripe { height: 4px; }
.modal-top  { padding: 24px 30px 18px; border-bottom: 1px solid var(--border); }
.modal-body { padding: 18px 30px 26px; }
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; transition: color 0.1s; font-family: inherit; z-index: 1; }
.modal-close:hover { color: var(--text); }
.modal-genre { font-size: 0.57rem; letter-spacing: 0.28em; text-transform: uppercase; margin-bottom: 7px; }
.modal-name  { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.85rem; line-height: 1.1; margin-bottom: 5px; }
.modal-venue-line { font-size: 0.66rem; color: var(--muted2); }
.modal-row { display: flex; gap: 10px; font-size: 0.65rem; padding: 7px 0; border-bottom: 1px solid var(--border); align-items: baseline; }
.modal-row-key { color: var(--muted); min-width: 68px; letter-spacing: 0.06em; flex-shrink: 0; font-size: 0.57rem; text-transform: uppercase; }
.modal-links-row { display: flex; gap: 18px; padding: 13px 0 0; flex-wrap: wrap; }
.modal-link { color: var(--muted2); text-decoration: none; transition: color 0.12s; font-size: 0.63rem; letter-spacing: 0.04em; }
.modal-link:hover { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
.modal-desc { margin-top: 14px; font-size: 0.68rem; color: var(--muted2); line-height: 1.85; font-style: italic; }

footer {
  padding: 14px 40px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: var(--surface);
  position: relative;
  z-index: 1;
}
footer a { color: var(--muted2); text-decoration: none; }
footer a:hover { color: var(--text); }
.hidden { display: none !important; }

/* Leaflet popup override — light */
.leaflet-popup-content-wrapper {
  background: #ffffff !important;
  border: 1px solid #e2d9cc !important;
  border-radius: 2px !important;
  box-shadow: 0 4px 24px rgba(30,23,20,0.14) !important;
  padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip { background: #ffffff !important; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Berlin <span class="logo-accent">Dances</span></div>
    <div class="logo-sub">Tango &nbsp;·&nbsp; Salsa &nbsp;·&nbsp; Swing &nbsp;·&nbsp; Social Dancing</div>
  </div>
  <div class="header-meta">Recurring weekly events<br>Updated 2026</div>
</header>

<div class="controls">
  <span class="controls-label">Style</span>
  <button class="filter-btn active-all" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn"            onclick="setFilter('Tango',this)">Tango</button>
  <button class="filter-btn"            onclick="setFilter('Salsa',this)">Salsa</button>
  <button class="filter-btn"            onclick="setFilter('Swing',this)">Swing</button>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-cal" onclick="setView('calendar')">&#9638; Calendar</button>
    <button class="view-btn"        id="btn-map" onclick="setView('map')">&#9678; Map</button>
  </div>
</div>

<main>
  <div id="view-calendar">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div id="view-map" class="hidden">
    <div id="map-loading">Loading map&hellip;</div>
    <div id="map" class="hidden"></div>
    <div class="map-legend">
      <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--tango)"></div>Tango</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--salsa)"></div>Salsa</div>
      <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--swing)"></div>Swing</div>
    </div>
  </div>
</main>

<div class="modal-overlay hidden" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-stripe" id="modal-stripe"></div>
    <button class="modal-close" onclick="closeModal()">&#215;</button>
    <div class="modal-top"  id="modal-top"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<footer>Made by <a href="https://idonov.com" target="_blank" rel="noopener">Ido Nov</a></footer>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const COLOR = { Tango: '#a01929', Salsa: '#c94d0f', Swing: '#2d6e4e' };

const sessions = [
  {
    name: "Milonga at Cafe Noir",
    venue: "Cafe Noir",
    address: "Near U Schönleinstraße, Neukölln, Berlin",
    day: ["Monday"],
    time: "21:00",
    type: "Tango",
    entry: "~5 EUR",
    note: "Every other Monday",
    description: "An intimate milonga steps from U-Bahn Schönleinstraße in the heart of Neukölln. A favourite among Buenos Aires-style social tango dancers. Close embrace, candlelight, a wooden floor that creaks just right.",
    lat: 52.4890, lng: 13.4244,
    url: null
  },
  {
    name: "Milonga at Bebo Bar",
    venue: "Bebo Bar",
    address: "Mehringdamm, Kreuzberg, Berlin",
    day: ["Wednesday","Thursday"],
    time: "21:00",
    type: "Tango",
    entry: "Free",
    description: "Tango twice a week on Mehringdamm in Kreuzberg. Wednesday and Thursday milongas draw a mix of locals and internationals. Traditional and nuevo tango, relaxed cortina-based tandas, all levels very welcome.",
    lat: 52.4900, lng: 13.3862,
    url: null
  },
  {
    name: "Milonga at Oblomov",
    venue: "Oblomov Bar",
    address: "Near Hermannplatz, Neukölln, Berlin",
    day: ["Tuesday"],
    time: "20:30",
    type: "Tango",
    entry: "~5 EUR",
    description: "Tuesday milonga at the beloved Oblomov Bar near Hermannplatz. A cozy, dimly-lit space that transforms into a proper milonga — good floor, good music, the kind of evening that stretches past midnight without you noticing.",
    lat: 52.4826, lng: 13.4261,
    url: null
  },
  {
    name: "Clärchen's Salsa Night",
    venue: "Clärchen's Ballhaus",
    address: "Auguststrasse 24, Mitte, Berlin",
    day: ["Monday"],
    time: "21:00",
    type: "Salsa",
    entry: "~8 EUR",
    description: "The legendary Clärchen's Ballhaus — a century-old Berlin dance hall on Auguststrasse — hosts Salsa Mondays in its ornate mirrored ballroom. Quite possibly the most beautiful place to dance salsa in Germany. Get there early for the best spot on the floor.",
    lat: 52.5262, lng: 13.3949,
    url: "https://claerchens-ballhaus.de"
  },
  {
    name: "Soda Club Salsa",
    venue: "Soda Club",
    address: "Columbiadamm 9–11, Tempelhof, Berlin",
    day: ["Thursday","Sunday"],
    time: "22:00",
    type: "Salsa",
    entry: "5–10 EUR",
    description: "One of Berlin's most popular salsa nights, next to the iconic Tempelhof airport. Thursday brings Cuban-style sets; Sunday is the big night. DJs, a wide open floor, and a crowd that actually knows how to dance.",
    lat: 52.4789, lng: 13.3797,
    url: null
  },
  {
    name: "Cumbancha",
    venue: "Cumbancha Berlin",
    address: "Kreuzberg, Berlin",
    day: ["Saturday"],
    time: "22:00",
    type: "Salsa",
    entry: "~8 EUR",
    description: "Saturday Latin nights at Cumbancha Berlin — a cherished fixture in the city's salsa scene. Expect salsa, bachata, merengue, and a crowd that dances until the lights come on. High energy, warm atmosphere.",
    lat: 52.4960, lng: 13.3980,
    url: null
  },
  {
    name: "Havanna Salsa Night",
    venue: "Havanna",
    address: "Hauptstrasse 30, Schöneberg, Berlin",
    day: ["Friday"],
    time: "22:00",
    type: "Salsa",
    entry: "5–10 EUR",
    description: "A Schöneberg institution since the early '90s. Havanna's Friday salsa nights are legendary — two floors, live percussion on special nights, and a mix of Cuban timba, salsa, and merengue. A true Berlin classic.",
    lat: 52.4854, lng: 13.3504,
    url: null
  },
  {
    name: "Swing Social at Villa Neukölln",
    venue: "Villa Neukölln",
    address: "Hermannstrasse 233, Neukölln, Berlin",
    day: ["Thursday"],
    time: "20:00",
    type: "Swing",
    entry: "5–10 EUR",
    description: "Live swing and lindy hop at one of Neukölln's most beloved cultural venues. Beginners welcome — intro lesson runs before the social dance begins. Regularly features live bands, a sprung wooden floor, and that rare Neukölln mix of regulars and curious newcomers.",
    lat: 52.4732, lng: 13.4391,
    url: "https://villa-neukoelln.de"
  },
];

let activeFilter = 'all', mapReady = false, leafletMap = null, mapMarkers = [];

function filtered() { return activeFilter === 'all' ? sessions : sessions.filter(e => e.type === activeFilter); }
function mapsUrl(a) { return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(a); }

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  btn.classList.add('active-' + f);
  renderCalendar();
  if (mapReady) { clearMarkers(); placeMarkers(); }
}

function setView(v) {
  document.getElementById('view-calendar').classList.toggle('hidden', v !== 'calendar');
  document.getElementById('view-map').classList.toggle('hidden', v !== 'map');
  document.getElementById('btn-cal').classList.toggle('active', v === 'calendar');
  document.getElementById('btn-map').classList.toggle('active', v === 'map');
  if (v === 'map' && !mapReady) loadLeaflet(initMap);
}

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DAYS.forEach(day => {
    const col = document.createElement('div');
    col.className = 'cal-col';
    const hdr = document.createElement('div');
    hdr.className = 'cal-day-header';
    hdr.textContent = day.slice(0, 3).toUpperCase();
    col.appendChild(hdr);
    const evList = document.createElement('div');
    evList.className = 'cal-day-events';
    const dayEvs = filtered().filter(e => e.day.includes(day));
    if (dayEvs.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-day';
      empty.innerHTML = '&mdash;';
      evList.appendChild(empty);
    } else {
      dayEvs.forEach(ev => {
        const card = document.createElement('div');
        card.className = 'evt-card evt-' + ev.type;
        card.onclick = () => openModal(ev);
        card.innerHTML =
          '<div class="evt-time">' + ev.time + '</div>' +
          '<div class="evt-name">' + ev.name + '</div>' +
          '<div class="evt-venue">' + ev.venue + '</div>' +
          '<div class="evt-tag tag-' + ev.type + '">' + ev.type + '</div>' +
          (ev.note ? '<div class="evt-note">' + ev.note + '</div>' : '');
        evList.appendChild(card);
      });
    }
    col.appendChild(evList);
    grid.appendChild(col);
  });
}

function openModal(ev) {
  const color = COLOR[ev.type] || '#888';
  document.getElementById('modal-stripe').style.background =
    'linear-gradient(to right, ' + color + ', ' + color + 'aa)';
  document.getElementById('modal-top').innerHTML =
    '<div class="modal-genre" style="color:' + color + '">' + ev.type + '</div>' +
    '<div class="modal-name">' + ev.name + '</div>' +
    '<div class="modal-venue-line">' + ev.venue + ' &nbsp;&middot;&nbsp; ' + ev.address + '</div>';
  document.getElementById('modal-body').innerHTML =
    '<div class="modal-row"><span class="modal-row-key">Day</span><span>' +
      ev.day.join(', ') +
      (ev.note ? ' <span style="color:var(--muted);font-size:0.57rem;font-style:italic">(' + ev.note + ')</span>' : '') +
    '</span></div>' +
    '<div class="modal-row"><span class="modal-row-key">Time</span><span>' + ev.time + '</span></div>' +
    '<div class="modal-row"><span class="modal-row-key">Entry</span><span>' + ev.entry + '</span></div>' +
    '<div class="modal-links-row">' +
      '<a class="modal-link" href="' + mapsUrl(ev.address) + '" target="_blank" rel="noopener">&#128205; Google Maps</a>' +
      (ev.url ? '<a class="modal-link" href="' + ev.url + '" target="_blank" rel="noopener">&#128279; More info</a>' : '') +
    '</div>' +
    '<div class="modal-desc">&ldquo;' + ev.description + '&rdquo;</div>';
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function loadLeaflet(cb) {
  if (typeof L !== 'undefined') { cb(); return; }
  const css = document.createElement('link');
  css.rel = 'stylesheet';
  css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
  document.head.appendChild(css);
  const s = document.createElement('script');
  s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  s.onload = cb;
  s.onerror = () => { document.getElementById('map-loading').textContent = 'Map failed to load.'; };
  document.head.appendChild(s);
}

function initMap() {
  mapReady = true;
  document.getElementById('map-loading').classList.add('hidden');
  const mapEl = document.getElementById('map');
  mapEl.classList.remove('hidden');
  leafletMap = L.map('map').setView([52.497, 13.388], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(leafletMap);
  placeMarkers();
}

function clearMarkers() { mapMarkers.forEach(m => m.remove()); mapMarkers = []; }

function placeMarkers() {
  filtered().forEach(ev => {
    const color = COLOR[ev.type] || '#888';
    const icon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;background:' + color + ';border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.22),0 0 0 2px ' + color + '55;"></div>',
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });
    const popup =
      '<div style="font-family:\'DM Sans\',sans-serif;font-size:11px;padding:14px 16px;min-width:200px;background:#fff;color:#1e1714;">' +
        '<div style="color:' + color + ';font-size:9px;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:4px">' + ev.type + '</div>' +
        '<div style="font-family:\'Playfair Display\',serif;font-weight:700;font-size:15px;margin-bottom:3px">' + ev.name + '</div>' +
        '<div style="color:#6d5c52;font-size:10px;margin-bottom:9px">' + ev.venue + '</div>' +
        '<div style="color:#a08e82;font-size:10px;border-top:1px solid #e2d9cc;padding-top:7px">' + ev.day.join(', ') + ' &middot; ' + ev.time + '</div>' +
        '<div style="color:#c0b0a8;font-size:10px;margin-top:2px">' + ev.entry + '</div>' +
      '</div>';
    const marker = L.marker([ev.lat, ev.lng], { icon }).addTo(leafletMap)
      .bindPopup(popup, { maxWidth: 280, closeButton: false })
      .on('click', () => openModal(ev));
    mapMarkers.push(marker);
  });
}

renderCalendar();
</script>
</body>
</html>
