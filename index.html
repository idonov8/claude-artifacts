<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>artifacts/</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
      background: #faf9f6;
      color: #2c2a25;
      padding: 3rem 2rem 5rem;
      max-width: 720px;
      margin: 0 auto;
      line-height: 1.6;
    }

    header {
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #2c2a25;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #c0b8a8;
    }

    #list { list-style: none; }

    #list li {
      padding: 1rem 0.75rem;
      border-top: 1px solid #e8e4dc;
      display: grid;
      grid-template-columns: 6.5rem 1fr;
      gap: 0 1.25rem;
    }

    #list li:last-child { border-bottom: 1px solid #e8e4dc; }

    #list li:hover { background: #f3f0ea; margin: 0 -0.75rem; padding: 1rem 1.5rem; }

    .date {
      font-size: 0.78rem;
      color: #b0a898;
      padding-top: 0.1em;
      white-space: nowrap;
    }

    .info { display: flex; flex-direction: column; gap: 0.2rem; }

    .title a {
      font-size: 0.9rem;
      font-weight: 600;
      color: #5a7fa0;
      text-decoration: none;
    }

    .title a:hover { text-decoration: underline; text-underline-offset: 3px; }

    .desc {
      font-size: 0.8rem;
      color: #8c8070;
    }

    .empty, .error {
      font-size: 0.85rem;
      color: #b0a898;
      padding: 1rem 0;
      border-top: 1px solid #e8e4dc;
    }
  </style>
</head>
<body>
  <header>
    <h1>Ido's artifacts</h1>
  </header>

  <ul id="list"></ul>
  <footer>made in collaboration with <a href="https://claude.ai" style="color:inherit">claude</a></footer>

  <script>
    const list = document.getElementById('list');

    fetch('artifacts/manifest.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(items => {
        if (!items.length) {
          list.innerHTML = '<li class="empty">no artifacts yet.</li>';
          return;
        }
        items
          .sort((a, b) => b.date.localeCompare(a.date))
          .forEach(a => {
            const li = document.createElement('li');
            li.innerHTML = `
              <div class="date">${a.date}</div>
              <div class="info">
                <div class="title"><a href="${a.path}" target="_blank" rel="noopener">${a.title}</a></div>
                <div class="desc">${a.description}</div>
              </div>`;
            list.appendChild(li);
          });
      })
      .catch(err => {
        list.innerHTML = `<li class="error">error: ${err.message}</li>`;
      });
  </script>
</body>
</html>
