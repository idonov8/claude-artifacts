<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Artifacts Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface-hover: #22222e;
      --border: #2e2e3e;
      --text: #e8e8f0;
      --text-muted: #7878a0;
      --accent: #7c6af7;
      --accent-soft: #a89df9;
      --date: #4a4a6a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 2rem 1.75rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent-soft);
    }

    header p {
      margin-top: 0.35rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    #count {
      font-size: 0.8rem;
      color: var(--date);
      margin-bottom: 1.5rem;
      font-variant-numeric: tabular-nums;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .card {
      background: var(--surface);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: background 0.15s;
    }

    .card:hover {
      background: var(--surface-hover);
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--date);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card-title a {
      color: var(--accent-soft);
      text-decoration: none;
    }

    .card-title a:hover {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }

    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty p { font-size: 0.9rem; margin-top: 0.5rem; }

    .error {
      background: #2a1515;
      border: 1px solid #5a2020;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      color: #f08080;
      font-size: 0.875rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--date);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Claude <span>Artifacts</span></h1>
    <p>Interactive demos and experiments generated by Claude</p>
  </header>

  <main>
    <div id="count"></div>
    <div id="gallery"></div>
  </main>

  <footer>Artifacts generated by <a href="https://claude.ai" style="color:inherit">Claude</a> · Hosted on GitHub Pages</footer>

  <script>
    const gallery = document.getElementById('gallery');
    const countEl = document.getElementById('count');

    function formatDate(iso) {
      const [y, m, d] = iso.split('-');
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    fetch('artifacts/manifest.json')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(artifacts => {
        if (!artifacts.length) {
          gallery.innerHTML = '<div class="empty"><strong>No artifacts yet</strong><p>Claude will add them here automatically.</p></div>';
          return;
        }

        const sorted = [...artifacts].sort((a, b) => b.date.localeCompare(a.date));
        countEl.textContent = `${sorted.length} artifact${sorted.length === 1 ? '' : 's'}`;

        const grid = document.createElement('div');
        grid.className = 'grid';

        for (const a of sorted) {
          grid.innerHTML += `
            <div class="card">
              <div class="card-date">${formatDate(a.date)}</div>
              <div class="card-title"><a href="${a.path}" target="_blank" rel="noopener">${a.title}</a></div>
              <div class="card-desc">${a.description}</div>
            </div>`;
        }

        gallery.appendChild(grid);
      })
      .catch(err => {
        gallery.innerHTML = `<div class="error">Failed to load manifest: ${err.message}</div>`;
      });
  </script>
</body>
</html>
